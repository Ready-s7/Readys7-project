name: CI/CD Pipeline

on:
  pull_request:
    branches: [dev]
  push:
    branches: [dev]

jobs:
  ci:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: JDK 17 설정
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "corretto"

      - name: Gradle 캐시 설정
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('backend/**/*.gradle*', 'backend/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Gradle 실행 권한 부여
        run: chmod +x gradlew

      - name: 테스트 실행
        env:
          SPRING_PROFILES_ACTIVE: test
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: ./gradlew test

  cd:
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push'

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/readys7-backend
      APP_PORT: "8080"
      HEALTH_PATH: "/api/actuator/health"

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: AWS 자격 증명 설정
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Docker Hub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: QEMU 설정
        uses: docker/setup-qemu-action@v3

      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v3

      - name: Docker 이미지 빌드 및 푸시
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest

      - name: app-project-1 배포
        run: |
          aws elbv2 deregister-targets \
            --target-group-arn "${{ secrets.TARGET_GROUP_ARN }}" \
            --targets Id="${{ secrets.APP1_INSTANCE_ID }}"

          sleep 20

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.APP1_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters commands="[
              \"sudo docker stop app || true\",
              \"sudo docker rm app || true\",
              \"sudo docker pull $IMAGE_NAME:latest\", 
              \"sudo docker run -d --name app -p $APP_PORT:$APP_PORT --restart unless-stopped -e SPRING_PROFILES_ACTIVE=prod -e SPRING_DATASOURCE_URL=jdbc:mysql://${{ secrets.RDS_ENDPOINT }}:3306/${{ secrets.DB_NAME }} -e SPRING_DATASOURCE_USERNAME=${{ secrets.DB_USERNAME }} -e SPRING_DATASOURCE_PASSWORD=${{ secrets.DB_PASSWORD }} -e SPRING_DATA_REDIS_HOST=${{ secrets.REDIS_HOST }} -e SPRING_DATA_REDIS_PORT=${{ secrets.REDIS_PORT }} -e JWT_SECRET=${{ secrets.JWT_SECRET }} $IMAGE_NAME:latest\"
            ]" \
            --query "Command.CommandId" \
            --output text)

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.APP1_INSTANCE_ID }}"

          aws elbv2 register-targets \
            --target-group-arn "${{ secrets.TARGET_GROUP_ARN }}" \
            --targets Id="${{ secrets.APP1_INSTANCE_ID }}"

      - name: app-project-1 헬스체크 대기
        run: |
          for i in {1..30}; do
            STATE=$(aws elbv2 describe-target-health \
              --target-group-arn "${{ secrets.TARGET_GROUP_ARN }}" \
              --targets Id="${{ secrets.APP1_INSTANCE_ID }}" \
              --query 'TargetHealthDescriptions[0].TargetHealth.State' \
              --output text)

            if [ "$STATE" = "healthy" ]; then
              echo "app-project-1 healthy"
              exit 0
            fi

            echo "app-project-1 state: $STATE"
            sleep 10
          done

          echo "app-project-1 did not become healthy in time"
          exit 1

      - name: app-project-2 배포
        run: |
          aws elbv2 deregister-targets \
            --target-group-arn "${{ secrets.TARGET_GROUP_ARN }}" \
            --targets Id="${{ secrets.APP2_INSTANCE_ID }}"

          sleep 20

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.APP2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters commands="[
              \"sudo docker stop app || true\",
              \"sudo docker rm app || true\",
              \"sudo docker pull $IMAGE_NAME:latest\",
              \"sudo docker run -d --name app -p $APP_PORT:$APP_PORT --restart unless-stopped -e SPRING_PROFILES_ACTIVE=prod -e SPRING_DATASOURCE_URL=jdbc:mysql://${{ secrets.RDS_ENDPOINT }}:3306/${{ secrets.DB_NAME }} -e SPRING_DATASOURCE_USERNAME=${{ secrets.DB_USERNAME }} -e SPRING_DATASOURCE_PASSWORD=${{ secrets.DB_PASSWORD }} -e SPRING_DATA_REDIS_HOST=${{ secrets.REDIS_HOST }} -e SPRING_DATA_REDIS_PORT=${{ secrets.REDIS_PORT }} -e JWT_SECRET=${{ secrets.JWT_SECRET }} $IMAGE_NAME:latest\"
            ]" \
            --query "Command.CommandId" \
            --output text)

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.APP2_INSTANCE_ID }}"

          aws elbv2 register-targets \
            --target-group-arn "${{ secrets.TARGET_GROUP_ARN }}" \
            --targets Id="${{ secrets.APP2_INSTANCE_ID }}"

      - name: app-project-2 헬스체크 대기
        run: |
          for i in {1..30}; do
            STATE=$(aws elbv2 describe-target-health \
              --target-group-arn "${{ secrets.TARGET_GROUP_ARN }}" \
              --targets Id="${{ secrets.APP2_INSTANCE_ID }}" \
              --query 'TargetHealthDescriptions[0].TargetHealth.State' \
              --output text)

            if [ "$STATE" = "healthy" ]; then
              echo "app-project-2 healthy"
              exit 0
            fi

            echo "app-project-2 state: $STATE"
            sleep 10
          done

          echo "app-project-2 did not become healthy in time"
          exit 1
